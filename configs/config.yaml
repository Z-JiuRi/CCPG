data:
  data_dir: path/to/data_dir
  stats_path: path/to/stats
  num_workers: 0
  train_ratio: 0.9
  device: cuda:0
  token_size: 1024
  cond_shape:
  - 224
  - 512
  original_shapes:
    a1:
    - 8
    - 2688
    b1:
    - 10752
    - 8
    a2:
    - 8
    - 10752
    b2:
    - 2688
    - 8
  max_len: 210
resampler:
  latent_cond_len: 128
  hidden_dim: 1024
  num_heads: 8
  depth: 4
  dropout: 0.2
diffusion:
  timesteps: 1000
  prediction_type: eps
  snr_gamma: 10.0
  betas:
    scheduler_type: linear
    beta_start: 0.0001
    beta_end: 0.02
    s: 0.008
  small_weight: 0.1
dit:
  num_heads: 8
  depth: 12
  mlp_ratio: 4.0
  dropout: 0.2
train:
  # pretrained: None
  # resume: false
  seed: 3407
  epochs: 10000
  batch_size: 64
  weight_decay: 0.05
  grad_accum_steps: 6
  save_interval: 100
  val_interval: 10
  grad_clip: 1.0
  cfg_drop_rate: 0.1
  ema_rate: 0.9999
  cond_noise_factor: 0.01
lr_scheduler:
  type: cosine_warmup
  max_lr: 0.0003
  warmup_ratio: 0.1
  restart_points:
  - 0.1
  - 0.3
  - 0.8
  decay_ratio: 0.7
  start_lr: 1.0e-05
  eta_min: 1.0e-05
inference:
  seed: 3407
  use_ema: true
  config: path/to/config
  checkpoint_path: path/to/checkpoint
  cond_path: path/to/conditions
  cfg_scale: 1.0
  use_ddim: true
  ddim_steps: 50
  eta: 1.0
  output_dir: path/to/output_dir
# ablation:
  # - structure
  # - size_aware
  # - resampler
exp_dir: path/to/exp_dir
msg: 1
